
<!DOCTYPE html>

<html>

<head>

<title>Storage Compare Pro - Compare Data Storage</title>

<meta name="description" content="Compare HDD, SSD, NVMe, USB, SD cards and cloud storage by price, capacity, speed and lifespan.">

<style>

body {
    margin:0;
    font-family:Arial, sans-serif;
    background:#0f172a;
    color:#e2e8f0;
}


header {
    background:linear-gradient(90deg,#0ea5e9,#1e293b);
    padding:30px;
    text-align:center;
    font-size:32px;
    font-weight:bold;
}


nav {
    background:#020617;
    padding:15px;
    text-align:center;
}


nav a {
    color:white;
    text-decoration:none;
    margin:15px;
    font-weight:bold;
}


nav a:hover {
    color:#38bdf8;
}


main {
    max-width:1200px;
    margin:auto;
    padding:25px;
}


.ad {
    background:#1e293b;
    border:2px dashed #475569;
    padding:25px;
    text-align:center;
    color:#94a3b8;
    margin:20px 0;
}


.controls {
    background:#1e293b;
    padding:20px;
    border-radius:12px;
}


input, select {
    padding:10px;
    margin:10px;
    background:#334155;
    color:white;
    border:none;
    border-radius:5px;
}



.cards {

    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:20px;

}


.card {

    background:#1e293b;
    padding:25px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,.3);

}


.card h2 {

    color:#38bdf8;

}


.stat {

    margin:10px 0;

}


.bar {

    background:#334155;
    height:12px;
    border-radius:10px;
    overflow:hidden;

}


.fill {

    height:100%;
    background:#22c55e;

}


button {

    background:#0ea5e9;
    border:none;
    padding:10px 15px;
    color:white;
    border-radius:5px;
    cursor:pointer;

}


button:hover {

    background:#0284c7;

}



footer {

    text-align:center;
    padding:25px;
    background:#020617;
    color:#94a3b8;

}


</style>

</head>

<body>

<header>

Storage Compare Pro

<p style="font-size:18px;">
Compare storage by price, speed, capacity and lifespan
</p>

</header>

<nav>

<a href="index.html">Home</a>

<a href="articles.html">Articles</a>

<a href="about.html">About</a>

<a href="contact.html">Contact</a>

<a href="privacy.html">Privacy</a>

</nav>

<main>

<div class="ad">

Advertisement Space (728x90)

<br>

Google AdSense placement

</div>

<div class="controls">

<h2>Storage Search</h2>

<input
type="text"
id="search"
placeholder="Search storage type..."

>

<select id="filter">

<option value="all">
All Storage
</option>

<option value="cheap">
Lowest Cost/TB
</option>

<option value="long">
Longest Lifespan
</option>

<option value="fast">
Fastest
</option>

</select>

</div>

<h1>Storage Comparison</h1>

<div id="cards" class="cards"></div>

<div class="ad">

Advertisement Space (300x250)

</div>

</main>

<footer>

© 2026 Storage Compare Pro

</footer>

<script>


const storage = [

{
name:"HDD",
capacity:"1TB - 24TB",
price:100,
tb:4,
speed:2,
life:6,
description:"Affordable high capacity storage for backups and archives."
},


{
name:"SATA SSD",
capacity:"250GB - 8TB",
price:120,
tb:2,
speed:4,
life:8,
description:"Fast everyday storage for computers and gaming."
},


{
name:"NVMe SSD",
capacity:"500GB - 8TB",
price:180,
tb:2,
speed:5,
life:7,
description:"Ultra-fast storage for gaming and professional workloads."
},


{
name:"USB Flash Drive",
capacity:"16GB - 1TB",
price:40,
tb:0.5,
speed:3,
life:5,
description:"Portable storage for transferring files."
},


{
name:"SD Card",
capacity:"32GB - 1TB",
price:60,
tb:0.5,
speed:3,
life:5,
description:"Used in cameras, phones and portable devices."
},


{
name:"Cloud Storage",
capacity:"Flexible",
price:100,
tb:2,
speed:4,
life:100,
description:"Online storage accessible anywhere."
}

];



function cost(item){

return (item.price/item.tb).toFixed(2);

}



function display(data){


let container=document.getElementById("cards");

container.innerHTML="";


data.forEach(item=>{


let lifespan=(item.life/100)*100;


container.innerHTML += `


<div class="card">


<h2>${item.name}</h2>


<p>${item.description}</p>


<div class="stat">
<strong>Capacity:</strong>
${item.capacity}
</div>


<div class="stat">
<strong>Example Price:</strong>
$${item.price}
</div>


<div class="stat">
<strong>Cost per TB:</strong>
$${cost(item)}
</div>


<div class="stat">
<strong>Speed:</strong>
${item.speed}/5
</div>


<div class="stat">
<strong>Lifespan:</strong>
${item.life} years
</div>


<div class="bar">

<div class="fill" style="width:${lifespan}%"></div>

</div>


<br>


<button>
Compare
</button>


<button>
Buy
</button>


</div>


`;

});


}



function update(){


let value=document
.getElementById("search")
.value
.toLowerCase();


let filter=document
.getElementById("filter")
.value;



let result=storage.filter(x=>

x.name.toLowerCase()
.includes(value)

);



if(filter==="cheap"){

result.sort((a,b)=>
cost(a)-cost(b)
);

}



if(filter==="long"){

result.sort((a,b)=>
b.life-a.life
);

}



if(filter==="fast"){

result.sort((a,b)=>
b.speed-a.speed
);

}



display(result);


}



document
.getElementById("search")
.addEventListener("input",update);



document
.getElementById("filter")
.addEventListener("change",update);



display(storage);


</script>

</body>

</html>
